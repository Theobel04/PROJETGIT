name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Tests Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Installation des dépendances backend
        working-directory: backend
        run: npm install

      - name: Tests unitaires et intégration
        working-directory: backend
        run: npm test
        env:
          JWT_SECRET: secret_key_for_dev
          NODE_ENV: test

      - name: Upload couverture de code
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage
          path: backend/coverage/

  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Installation des dépendances frontend
        working-directory: frontend
        run: npm install

      - name: Build de production
        working-directory: frontend
        run: npm run build

  health-check:
    name: Health Check API
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Installation backend
        working-directory: backend
        run: npm install

      - name: Démarrage et vérification
        working-directory: backend
        run: |
          node server.js &
          sleep 5
          curl --fail http://localhost:3001/health || exit 1
        env:
          JWT_SECRET: secret_key_for_dev
          NODE_ENV: test
