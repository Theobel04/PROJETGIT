name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Tests Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Installation des dépendances backend
        working-directory: backend
        run: npm install

      - name: Tests unitaires et intégration
        run: cd backend && npm test
        env:
          JWT_SECRET: secret_key_for_dev
          NODE_ENV: test

  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Installation des dépendances frontend
        working-directory: frontend
        run: npm install

      - name: Build de production
        working-directory: frontend
        run: npm run build

  health-check:
    name: Health Check API
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Installation backend
        working-directory: backend
        run: npm install

      - name: Démarrage et vérification
        working-directory: backend
        run: |
          node server.js &
          sleep 5
          curl --fail http://localhost:3001/health || exit 1
        env:
          JWT_SECRET: secret_key_for_dev
          NODE_ENV: test
name: CI Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install backend dependencies
        run: cd backend && npm install
      - name: Run backend tests
        run: cd backend && npm test -- --passWithNoTests
      - name: Run backend lint
        run: cd backend && npm run lint
      - name: Backend coverage
        run: cd backend && npm run test:coverage -- --passWithNoTests
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install frontend dependencies
        run: cd frontend && npm install
      - name: Run frontend tests
        run: cd frontend && npm test -- --passWithNoTests
